<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top 10 Lượt Xem - DLUAPHIM</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #0f0f11; color: white; margin: 0; }
        
        .top-container { 
            max-width: 800px; 
            margin: 40px auto; 
            padding: 30px; 
            background: #1c1c1f; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .top-header { text-align: center; margin-bottom: 30px; border-bottom: 1px solid #333; padding-bottom: 20px;}
        .top-header h1 { color: #ffda76; margin: 0 0 10px 0; font-size: 32px;}
        .top-header p { color: #888; margin: 0; }
        .top-item { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #2a2a2f; 
            transition: all 0.3s ease; 
            cursor: pointer; 
            border-radius: 8px;
        }
        .top-item:hover { 
            background: #2a2a2f; 
            transform: translateX(10px);
        }
        .top-rank { font-size: 35px; font-weight: bold; color: #555; width: 70px; text-align: center; font-style: italic;}
        .rank-1 { color: #ffd700; text-shadow: 0 0 10px rgba(255, 215, 0, 0.5); } /* Vàng */
        .rank-2 { color: #c0c0c0; } /* Bạc */
        .rank-3 { color: #cd7f32; } /* Đồng */
        .top-thumb { width: 80px; height: 110px; object-fit: cover; border-radius: 6px; margin-right: 20px; }
        .top-info { flex: 1; }
        .top-title { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .top-views { color: #ffda76; font-size: 16px; background: rgba(255, 218, 118, 0.1); display: inline-block; padding: 5px 12px; border-radius: 20px;}
        .btn-play-mini { background: #ffda76; color: black; border: none; padding: 8px 15px; border-radius: 4px; font-weight: bold; pointer-events: none;}
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="top-container">
        <div class="top-header">
            <h1>🔥 Top 10 Phim Thịnh Hành</h1>
            <p>Bảng xếp hạng những bộ phim có tổng lượt xem cao nhất hệ thống</p>
        </div>

        <div id="top-list">
            <h3 style="color:#888; text-align:center; padding: 40px;">Đang tải dữ liệu...</h3>
        </div>
    </div>

    <script>
        async function loadTopMovies() {
            try {
                const res = await fetch('https://dluaphim-api.onrender.com/api/movies/top-10');
                const movies = await res.json();              
                const listDiv = document.getElementById('top-list');
                listDiv.innerHTML = '';
                movies.forEach((movie, index) => {
                    const rank = index + 1;
                    let rankClass = '';
                    if(rank === 1) rankClass = 'rank-1';
                    else if(rank === 2) rankClass = 'rank-2';
                    else if(rank === 3) rankClass = 'rank-3';
                    listDiv.innerHTML += `
                        <div class="top-item" onclick="window.location.href='detail.html?slug=${movie.slug}'">
                            <div class="top-rank ${rankClass}">#${rank}</div>
                            <img class="top-thumb" src="${movie.thumbnail}" alt="${movie.title}">
                            
                            <div class="top-info">
                                <div class="top-title">${movie.title}</div>
                                <div class="top-views">👁️ ${movie.views.toLocaleString('vi-VN')} Lượt xem</div>
                            </div>
                            
                            <button class="btn-play-mini">▶</button>
                        </div>
                    `;
                });
            } catch (error) {
                console.error('Lỗi tải bảng xếp hạng:', error);
                document.getElementById('top-list').innerHTML = '<h3 style="color:red; text-align:center;">Có lỗi xảy ra, không thể tải dữ liệu!</h3>';
            }
        }
        loadTopMovies();
    </script>
    <script src="loadHeader.js"></script>
</body>
</html>
