<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xem phim - DLUAPHIM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body>
    <header class="navbar">
        <div class="logo"><h2 onclick="window.location.href='index.html'" style="cursor:pointer">🎬 DLUAPHIM</h2></div>
    </header>

    <main class="main-content" style="max-width: 1200px; margin: 0 auto;">
        
        <div id="player-container" style="width: 100%; height: 600px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 20px;">
            </div>

        <div class="watch-layout">
            
            <div class="watch-left">
                
                <div class="box-section movie-detail-info">
                    <img id="detail-thumb" src="" alt="Ảnh bìa">
                    <div>
                        <h1 id="movie-title" style="color: #ffcc00; margin-bottom: 10px;">Đang tải...</h1>
                        <div class="tag-list" style="margin-bottom: 15px;">
                            <span>IMDb 8.0</span> <span id="movie-status">...</span> <span>2026</span>
                        </div>
                        <p id="movie-desc" style="color: #ccc; line-height: 1.6; font-size: 14px;">
                            Đang tải nội dung...
                        </p>
                    </div>
                </div>

                <div class="box-section">
                    <h3 style="margin-bottom: 15px;">≡ Chọn Tập Phim</h3>
                    <div id="episode-list">
                    </div>
                </div>

                <!-- KHU VỰC BÌNH LUẬN -->
                <div class="box-section">
                    <h3 style="color: #ffda76; margin-top: 0;">💬 Bình luận (<span id="comment-count">0</span>)</h3>
                    
                    <div class="comment-form">
                        <textarea id="comment-input" placeholder="Bạn nghĩ sao về bộ phim này? Chia sẻ cảm nghĩ của bạn nhé..." onkeypress="handleEnter(event)"></textarea>
                        <button onclick="submitComment()" style="background: #ffda76; color: black; padding: 10px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; float: right; margin-top: 10px; transition: 0.3s;">Gửi Bình Luận</button>
                        <div style="clear: both;"></div>
                    </div>

                    <!-- Danh sách comment sẽ hiện ở đây -->
                    <div id="comments-list" style="margin-top: 30px;">
                        <div style="color: #888; text-align: center;">Đang tải bình luận...</div>
                    </div>
                </div>

            </div>

            <div class="watch-right">
                
                <div class="box-section">
                    <h3 style="margin-bottom: 20px;">👤 Diễn viên</h3>
                    <div class="actor-list">
                        <div class="actor-item">
                            <div class="actor-avatar"></div>
                            <div class="actor-name">Lee Jong Suk</div>
                        </div>
                        <div class="actor-item">
                            <div class="actor-avatar"></div>
                            <div class="actor-name">Han Hyo Joo</div>
                        </div>
                        <div class="actor-item">
                            <div class="actor-avatar"></div>
                            <div class="actor-name">Gong Yoo</div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <script>
const urlParams = new URLSearchParams(window.location.search);
        const movieId = urlParams.get('id');
        let currentEpisodes = [];
        if (!movieId) {
            window.location.href = 'index.html';
        }
        fetch(`https://dluaphim-api.onrender.com/api/movies/${movieId}/view`, { method: 'POST' });

        async function loadMovieDetail() {
            try {
                const response = await fetch(`https://dluaphim-api.onrender.com/api/movies/${movieId}`);
                const movie = await response.json();

                document.getElementById('movie-title').innerText = movie.title;
                document.getElementById('movie-desc').innerHTML = movie.description || 'Chưa có thông tin mô tả cho bộ phim này.';
                document.getElementById('movie-status').innerText = movie.status;
                document.getElementById('detail-thumb').src = movie.thumbnail;

                // Lấy mảng tập phim (nếu web cũ dùng videoUrl thì gom nó thành mảng 1 tập để không bị lỗi)
                currentEpisodes = movie.episodes && movie.episodes.length > 0 
                    ? movie.episodes 
                    : (movie.videoUrl ? [{ name: 'Tập 1', url: movie.videoUrl }] : []);

                renderEpisodeButtons();
                const username = localStorage.getItem('username');
                if (username) {
                    fetch('https://dluaphim-api.onrender.com/api/users/history', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: username, movieId: movieId })
                    });
                }

                if (currentEpisodes.length > 0) {
                    playEpisode(0); // Mặc định mở lên là phát Tập 1 (index 0)
                } else {
                    document.getElementById('player-container').innerHTML = '<h3 style="color:white; text-align:center; padding-top: 200px;">Phim đang cập nhật...</h3>';
                }

            } catch (error) {
                console.error('Lỗi tải phim:', error);
            }
        }

        // Hàm vẽ ra các nút chọn tập
        function renderEpisodeButtons() {
            const listDiv = document.getElementById('episode-list');
            listDiv.innerHTML = ''; // Xóa các nút tĩnh cũ đi

            currentEpisodes.forEach((ep, index) => {
                const btn = document.createElement('button');
                btn.className = `episode-btn ${index === 0 ? 'active' : ''}`; // Mặc định Tập 1 sáng màu
                btn.innerText = ep.name;
                
                // Khi bấm vào nút
                btn.onclick = () => {
                    // Xóa màu vàng ở tất cả các nút
                    document.querySelectorAll('.episode-btn').forEach(b => b.classList.remove('active'));
                    // Tô màu vàng cho nút vừa bấm
                    btn.classList.add('active');
                    // Phát phim
                    playEpisode(index);
                };
                
                listDiv.appendChild(btn);
            });
        }

        // Hàm phát phim theo số thứ tự tập
        function playEpisode(index) {
            const url = currentEpisodes[index].url;
            const playerContainer = document.getElementById('player-container');

            if (url.includes('youtube.com') || url.includes('youtu.be')) {
                // Xử lý YouTube
                let ytId = '';
                if (url.includes('v=')) ytId = url.split('v=')[1].split('&')[0];
                else if (url.includes('youtu.be/')) ytId = url.split('youtu.be/')[1].split('?')[0];

                playerContainer.innerHTML = `
                    <iframe width="100%" height="100%" 
                            src="https://www.youtube.com/embed/${ytId}?autoplay=1" 
                            frameborder="0" allow="autoplay; encrypted-media" allowfullscreen>
                    </iframe>`;
            } else if (url.includes('.m3u8')) {
                // Xử lý link m3u8 từ API KKPhim bằng thư viện HLS.js
                playerContainer.innerHTML = `
                    <video id="hls-video" width="100%" height="100%" controls autoplay style="background: #000;"></video>
                `;
                const video = document.getElementById('hls-video');
                
                if (Hls.isSupported()) {
                    const hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(video);
                    hls.on(Hls.Events.MANIFEST_PARSED, function() {
                        video.play();
                    });
                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Dành riêng cho trình duyệt Safari (Safari tự hiểu m3u8)
                    video.src = url;
                    video.addEventListener('loadedmetadata', function() {
                        video.play();
                    });
                }
            } else {
                // Xử lý link mp4 bình thường
                playerContainer.innerHTML = `
                    <video width="100%" height="100%" controls autoplay style="background: #000;">
                        <source src="${url}" type="video/mp4">
                    </video>`;
            }
        }

        if (movieId) {
            loadMovieDetail();
            loadComments();
        } else {
            window.location.href = 'index.html';
        }
        async function loadComments() {
            try {
                const res = await fetch(`https://dluaphim-api.onrender.com/api/movies/${movieId}/comments`);
                const comments = await res.json();
                
                document.getElementById('comment-count').innerText = comments.length;
                const listDiv = document.getElementById('comments-list');
                
                if(comments.length === 0) {
                    listDiv.innerHTML = '<div style="color: #888; text-align: center;">Chưa có bình luận nào. Hãy là người đầu tiên!</div>';
                    return;
                }

                listDiv.innerHTML = '';
                comments.forEach(cmt => {
                    // Chỉnh sửa thời gian cho thân thiện
                    const date = new Date(cmt.createdAt).toLocaleString('vi-VN');
                    
                    listDiv.innerHTML += `
                        <div style="display: flex; gap: 15px; margin-bottom: 20px; background: #2a2a2f; padding: 15px; border-radius: 8px; border-left: 3px solid #ffda76;">
                            <img src="${cmt.avatar}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #444;">
                            <div>
                                <h4 style="margin: 0; color: #fff; font-size: 15px;">${cmt.username} <span style="color: #888; font-size: 12px; font-weight: normal; margin-left: 10px;">🕒 ${date}</span></h4>
                                <p style="margin: 8px 0 0 0; color: #ccc; font-size: 14px; line-height: 1.5;">${cmt.content}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.error('Lỗi tải bình luận', err);
            }
        }

        // 2. Hàm gửi bình luận mới
        async function submitComment() {
            const username = localStorage.getItem('username');
            if (!username) {
                alert('Vui lòng đăng nhập để tham gia bình luận!');
                window.location.href = 'login.html';
                return;
            }

            const content = document.getElementById('comment-input').value.trim();
            if (!content) {
                alert('Bạn chưa nhập nội dung kìa!');
                return;
            }

            // Gọi nhanh Backend lấy avatar chuẩn của user đang chat
            let userAvatar = 'https://i.pravatar.cc/150?img=11';
            try {
                const userRes = await fetch(`https://dluaphim-api.onrender.com/api/users/${username}`);
                const userData = await userRes.json();
                if (userData.avatar) userAvatar = userData.avatar;
            } catch(e) {}

            // Bắn dữ liệu xuống API
            try {
                const res = await fetch(`https://dluaphim-api.onrender.com/api/movies/${movieId}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: username, avatar: userAvatar, content: content })
                });

                if (res.ok) {
                    document.getElementById('comment-input').value = ''; // Dọn dẹp ô nhập
                    loadComments(); // Load lại mượt mà không cần F5 trang
                }
            } catch (err) {
                alert('Lỗi gửi bình luận!');
            }
        }

        // 3. Tiện ích: Bấm phím Enter để gửi luôn cho nhanh
        function handleEnter(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault(); // Ngăn việc xuống dòng
                submitComment();
            }
        }
    </script>
</body>
</html>
