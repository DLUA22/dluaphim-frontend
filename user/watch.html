<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đang xem phim - DLUAPHIM</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="main-content" style="max-width: 1200px; margin: 0 auto;">
        
        <!-- KHUNG PHÁT VIDEO -->
        <div id="player-container" style="width: 100%; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);"></div>

        <div class="watch-layout">
            <div class="watch-left">
                
                <div class="box-section movie-detail-info">
                    <img id="detail-thumb" src="" alt="Ảnh bìa">
                    <div>
                        <h1 id="movie-title" style="color: #ffcc00; margin-bottom: 10px;">Đang tải...</h1>
                        <div class="tag-list" style="margin-bottom: 15px;">
                            <span>IMDb 8.0</span> <span id="movie-status">...</span> <span>2026</span>
                        </div>
                        <p id="movie-desc" style="color: #ccc; line-height: 1.6; font-size: 14px;">Đang tải nội dung...</p>
                    </div>
                </div>

                <div class="box-section">
                    <!-- KHU VỰC ĐA SERVER (VIETSUB / THUYẾT MINH) -->
                    <h3 style="margin-bottom: 15px; color: #ffda76;">🌐 Chọn Mạng (Server)</h3>
                    <div id="server-list" style="display: flex; gap: 10px; margin-bottom: 25px; flex-wrap: wrap; border-bottom: 1px solid #333; padding-bottom: 15px;"></div>

                    <h3 style="margin-bottom: 15px;">≡ Chọn Tập Phim</h3>
                    <div id="episode-list" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                </div>

                <div id="comments-section" style="margin-top: 40px;">
                    <h3 style="margin-bottom: 15px; color: #ffda76;">💬 Bình luận (<span id="comment-count">0</span>)</h3>
                    <div id="comment-form-area"></div>
                    <div id="comments-list" style="margin-top: 30px;">
                        <div style="color: #888; text-align: center;">Đang tải bình luận...</div>
                    </div>
                </div>

            </div>

            <div class="watch-right">
                <div class="box-section">
                    <h3 style="margin-bottom: 20px;">👤 Diễn viên</h3>
                    <div class="actor-list"></div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slug = urlParams.get("slug");
        let globalMovieData = null; 

        if (!slug) window.location.href = 'index.html';

        fetch(`https://dluaphim-api.onrender.com/api/movies/${slug}/view`, { method: 'POST' }).catch(()=>{});

        // ==========================================
        // 1. TẢI CHI TIẾT PHIM (CÓ ĐA SERVER)
        // ==========================================
        async function loadMovieDetail() {
            try {
                const response = await fetch(`https://phimapi.com/phim/${slug}`);
                const data = await response.json();
                
                if (data.status) {
                    const movie = data.movie;
                    globalMovieData = data; 

                    // 👇 ĐÃ SỬA LẠI ĐÚNG ID CỦA TRANG WATCH 👇
                    const thumbEl = document.getElementById("detail-thumb");
                    if (thumbEl) thumbEl.src = movie.thumb_url;
                    
                    const titleEl = document.getElementById("movie-title");
                    if (titleEl) titleEl.innerText = movie.name;
                    
                    const descEl = document.getElementById("movie-desc");
                    if (descEl) descEl.innerHTML = movie.content || 'Chưa có thông tin.';
                    
                    const statusEl = document.getElementById("movie-status");
                    if (statusEl) statusEl.innerText = movie.episode_current;
                    
                    document.title = `Đang xem: ${movie.name} - DLUAPHIM`;

                    renderActors(movie.actor);

                    // Lưu lịch sử xem phim
                    const username = sessionStorage.getItem('username');
                    if (username) {
                        fetch('https://dluaphim-api.onrender.com/api/users/history', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username: username, movieId: slug })
                        }).catch(()=>{});
                    }

                    // Tải server và phát phim
                    const episodes = data.episodes; 
                    if (episodes && episodes.length > 0) {
                        renderServerButtons(episodes);
                        const currentServerData = episodes[serverIndex].server_data;
                        renderEpisodeButtons(currentServerData);

                        let videoUrl = '';
                        if (tapSlug) {
                            const selectedEp = currentServerData.find(ep => ep.slug === tapSlug);
                            if (selectedEp) videoUrl = selectedEp.link_m3u8;
                        }
                        if (!videoUrl) videoUrl = currentServerData[0].link_m3u8;

                        playVideoM3U8(videoUrl);
                    } else {
                        document.getElementById('player-container').innerHTML = '<h3 style="color:white; text-align:center; padding-top: 200px;">Phim chưa có nguồn phát...</h3>';
                    }
                }
            } catch (error) { console.error("Lỗi tải phim:", error); }
        }

        function renderServerButtons(episodesArray) {
            const serverListDiv = document.getElementById("server-list");
            serverListDiv.innerHTML = '';
            episodesArray.forEach((server, index) => {
                const isActive = index === serverIndex; 
                const btn = document.createElement('button');
                btn.style.padding = "8px 15px";
                btn.style.background = isActive ? "rgba(255, 218, 118, 0.2)" : "transparent";
                btn.style.color = isActive ? "#ffda76" : "#aaa";
                btn.style.border = `1px solid ${isActive ? "#ffda76" : "#555"}`;
                btn.style.borderRadius = "5px";
                btn.style.cursor = "pointer";
                btn.style.fontWeight = isActive ? "bold" : "normal";
                btn.innerText = `📺 ${server.server_name}`;
                btn.onclick = () => {
                    const firstEpSlug = server.server_data[0].slug;
                    window.location.href = `watch.html?slug=${slug}&server=${index}&tap=${firstEpSlug}`;
                };
                serverListDiv.appendChild(btn);
            });
        }

        function renderActors(actorArray) {
            const actorContainer = document.querySelector('.actor-list');
            actorContainer.innerHTML = '';
            if (!actorArray || actorArray.length === 0 || actorArray[0] === "") {
                actorContainer.innerHTML = '<p style="color: #888;">Đang cập nhật...</p>';
                return;
            }
            actorArray.forEach(actor => {
                actorContainer.innerHTML += `
                    <div class="actor-item" style="display: flex; flex-direction: column; align-items: center; gap: 5px; width: 70px;">
                        <div class="actor-avatar" style="width: 50px; height: 50px; border-radius: 50%; background: #444; display: flex; justify-content: center; align-items: center; font-size: 20px;">🎭</div>
                        <div class="actor-name" style="color: #fff; font-weight: bold; font-size: 11px; text-align: center;">${actor}</div>
                    </div>
                `;
            });
        }

        function renderEpisodeButtons(serverData) {
            const listDiv = document.getElementById('episode-list');
            listDiv.innerHTML = ''; 
            serverData.forEach(ep => {
                const isActive = ep.slug === tapSlug ? 'active' : ''; 
                const btn = document.createElement('button');
                btn.className = `episode-btn ${isActive}`;
                btn.style.padding = "10px 15px";
                btn.style.background = isActive === 'active' ? "#ffda76" : "#333";
                btn.style.color = isActive === 'active' ? "#000" : "#fff";
                btn.style.border = "none";
                btn.style.borderRadius = "5px";
                btn.style.cursor = "pointer";
                btn.style.fontWeight = isActive === 'active' ? "bold" : "normal";
                btn.innerText = ep.name;
                btn.onclick = () => {
                    window.location.href = `watch.html?slug=${slug}&server=${serverIndex}&tap=${ep.slug}`;
                };
                listDiv.appendChild(btn);
            });
        }

        function playVideoM3U8(url) {
            if (window.hls) window.hls.destroy();
            if (window.player) window.player.destroy();

            const playerContainer = document.getElementById('player-container');
            playerContainer.innerHTML = `<video id="hls-video" width="100%" height="100%" crossorigin playsinline style="background: #000; outline: none;"></video>`;
            const video = document.getElementById('hls-video');

            const playerOptions = {
                controls: ['play-large', 'rewind', 'play', 'fast-forward', 'progress', 'current-time', 'duration', 'mute', 'volume', 'settings', 'pip', 'airplay', 'fullscreen'],
                settings: ['quality', 'speed'], 
                speed: { selected: 1, options: [0.5, 0.75, 1, 1.25, 1.5, 2] },
                i18n: { speed: 'Tốc độ', quality: 'Chất lượng', normal: 'Bình thường' }
            };

            if (Hls.isSupported()) {
                const hls = new Hls();
                window.hls = hls; 
                hls.loadSource(url);
                hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
                    const availableQualities = hls.levels.map((l) => l.height);
                    availableQualities.unshift(0); 
                    playerOptions.quality = {
                        default: 0, options: availableQualities, forced: true,
                        onChange: (e) => {
                            if (e === 0) hls.currentLevel = -1; 
                            else hls.levels.forEach((level, index) => { if (level.height === e) hls.currentLevel = index; });
                        },
                    };
                    window.player = new Plyr(video, playerOptions); 
                    video.play().catch(()=>{});
                });
                hls.attachMedia(video);
            } else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                window.player = new Plyr(video, playerOptions);
                video.addEventListener('loadedmetadata', function() { video.play(); });
            }
        }

        // ==========================================
        // 2. TẠO KHUNG BÌNH LUẬN (CHỈ VẼ KHUNG, KHÔNG DÍNH DÁNG ĐẾN HEADER)
        // ==========================================
        function renderCommentBox() {
            const commentFormArea = document.getElementById('comment-form-area');
            const username = sessionStorage.getItem('username');
            
            if (username && commentFormArea) {
                // Lấy thông tin có sẵn trong máy do loadHeader.js đã lưu
                const avatarSrc = sessionStorage.getItem('userAvatar') || 'https://i.pravatar.cc/150?img=11';
                const displayName = sessionStorage.getItem('displayName') || username; 
                
                commentFormArea.innerHTML = `
                    <div style="display: flex; gap: 15px; align-items: flex-start;">
                        <img src="${avatarSrc}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #444;">
                        <div style="flex: 1;">
                            <textarea id="comment-input" placeholder="${displayName} ơi, bạn nghĩ sao về phim này?..." style="width: 100%; height: 60px; background: #1c1c1f; border: 1px solid #444; border-radius: 8px; padding: 12px; color: white; font-family: inherit; resize: none;"></textarea>
                            <button onclick="submitComment()" style="background: #ffda76; color: black; padding: 8px 20px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; float: right; margin-top: 10px;">Gửi Bình Luận</button>
                        </div>
                    </div>
                    <div style="clear: both;"></div>
                `;
            } else if(commentFormArea) {
                commentFormArea.innerHTML = `<p style="color: #888; font-size: 14px;">Vui lòng <a href="login.html" style="color: #ffda76; font-weight: bold;">đăng nhập</a> để bình luận.</p>`;
            }
        }

        window.submitComment = async function() { sendCommentData(document.getElementById('comment-input').value, null, null); };
        window.submitReply = async function(parentId, replyToUsername) { sendCommentData(document.getElementById(`reply-input-${parentId}`).value, parentId, replyToUsername); };

        async function sendCommentData(content, parentId, replyToUsername) {
            const username = sessionStorage.getItem('username');
            const fullName = sessionStorage.getItem('displayName') || username; 
            const avatar = sessionStorage.getItem('userAvatar') || 'https://i.pravatar.cc/150?img=11';
            if (!content.trim()) return;
            try {
                const res = await fetch(`https://dluaphim-api.onrender.com/api/movies/${slug}/comments`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, fullName, avatar, content: content.trim(), parentId, replyToUser: replyToUsername })
                });
                if (res.ok) loadComments(); 
            } catch (err) { alert('Lỗi mạng!'); }
        }

        async function loadComments() {
            try {
                const res = await fetch(`https://dluaphim-api.onrender.com/api/movies/${slug}/comments`);
                const comments = await res.json();
                const listDiv = document.getElementById('comments-list');
                if (!Array.isArray(comments)) return;
                
                document.getElementById('comment-count').innerText = comments.length || 0;
                if(comments.length === 0) {
                    listDiv.innerHTML = '<div style="color: #888; text-align: center;">Chưa có bình luận nào!</div>';
                    return;
                }

                const parents = comments.filter(c => !c.parentId);
                const replies = comments.filter(c => c.parentId);
                listDiv.innerHTML = '';
                
                parents.forEach(cmt => {
                    const date = new Date(cmt.createdAt).toLocaleString('vi-VN');
                    const displayCmtName = cmt.fullName || cmt.username; 
                    const childReplies = replies.filter(r => r.parentId === cmt._id);
                    let repliesHtml = '';
                    
                    childReplies.forEach(reply => {
                        const rDate = new Date(reply.createdAt).toLocaleString('vi-VN');
                        const displayRepName = reply.fullName || reply.username;
                        repliesHtml += `
                            <div id="comment-${reply._id}" style="display: flex; gap: 10px; margin-top: 15px; margin-left: 50px; background: #1c1c1f; padding: 10px; border-radius: 8px; border-left: 2px solid #555;">
                                <img src="${reply.avatar}" style="width: 35px; height: 35px; border-radius: 50%; object-fit: cover;">
                                <div style="flex: 1;">
                                    <h4 style="margin: 0; color: #fff; font-size: 14px;">${displayRepName} <span style="color: #888; font-size: 11px; margin-left: 10px;">🕒 ${rDate}</span></h4>
                                    <p style="margin: 5px 0 0 0; color: #ccc; font-size: 13px;">
                                        <span style="color: #00d2ff; font-weight: bold;">@${reply.replyToUser}</span> ${reply.content}
                                    </p>
                                </div>
                            </div>
                        `;
                    });

                    listDiv.innerHTML += `
                        <div style="margin-bottom: 25px;">
                            <div id="comment-${cmt._id}" style="display: flex; gap: 15px; background: #2a2a2f; padding: 15px; border-radius: 8px; border-left: 3px solid #ffda76;">
                                <img src="${cmt.avatar}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1px solid #444;">
                                <div style="flex: 1;">
                                    <h4 style="margin: 0; color: #fff; font-size: 15px;">${displayCmtName} <span style="color: #888; font-size: 12px; font-weight: normal; margin-left: 10px;">🕒 ${date}</span></h4>
                                    <p style="margin: 8px 0; color: #ccc; font-size: 14px; line-height: 1.5;">${cmt.content}</p>
                                    <button onclick="showReplyForm('${cmt._id}', '${cmt.username}', '${displayCmtName}')" style="background: transparent; border: none; color: #ffda76; cursor: pointer; font-size: 13px; font-weight: bold; padding: 0;">↪ Trả lời</button>
                                    <div id="reply-form-${cmt._id}" style="display: none; margin-top: 10px;"></div>
                                </div>
                            </div>
                            ${repliesHtml}
                        </div>
                    `;
                });

                if (window.location.hash) {
                    const targetCmt = document.querySelector(window.location.hash);
                    if (targetCmt) {
                        setTimeout(() => {
                            targetCmt.scrollIntoView({ behavior: 'smooth', block: 'center' });
                            targetCmt.style.backgroundColor = 'rgba(255, 218, 118, 0.3)';
                            setTimeout(() => targetCmt.style.backgroundColor = '', 3000); 
                        }, 500); 
                    }
                }
            } catch (err) {}
        }

        window.showReplyForm = function(parentId, replyToUsername, displayCmtName) {
            document.querySelectorAll('[id^="reply-form-"]').forEach(el => el.style.display = 'none');
            const formDiv = document.getElementById(`reply-form-${parentId}`);
            formDiv.style.display = 'block';
            formDiv.innerHTML = `
                <div style="display: flex; gap: 10px; align-items: flex-start;">
                    <textarea id="reply-input-${parentId}" placeholder="Trả lời ${displayCmtName}..." style="flex: 1; height: 40px; background: #1c1c1f; border: 1px solid #444; border-radius: 6px; padding: 10px; color: white; resize: none; font-size: 13px; font-family: inherit;"></textarea>
                    <button onclick="submitReply('${parentId}', '${replyToUsername}')" style="background: #00d2ff; color: black; border: none; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 13px;">Gửi</button>
                </div>
            `;
            document.getElementById(`reply-input-${parentId}`).focus();
        }

        // =========================================================
        // KHỞI CHẠY (CHỈ CHẠY CÁC HÀM CỦA PHIM)
        // =========================================================
        document.addEventListener("DOMContentLoaded", () => {
            loadMovieDetail();
            renderCommentBox(); // Tự vẽ khung bình luận
            loadComments();
        });

        // CẢM BIẾN XOAY MÀN HÌNH TỰ ĐỘNG FULLSCREEN
        window.addEventListener("orientationchange", function() {
            setTimeout(() => {
                let angle = (window.screen && window.screen.orientation) ? window.screen.orientation.angle : window.orientation;
                if (angle === 90 || angle === -90 || angle === 270) {
                    if (window.player && !window.player.fullscreen.active) {
                        try { window.player.fullscreen.enter(); } catch(err) {}
                    }
                } else {
                    if (window.player && window.player.fullscreen.active) {
                        try { window.player.fullscreen.exit(); } catch(err) {}
                    }
                }
            }, 300); 
        });
    </script>
    <script src="loadHeader.js"></script>
</body>
</html>
